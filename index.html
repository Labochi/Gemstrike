<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GemStrike</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080d1a;--card:#111d35;--border:rgba(255,255,255,0.07);--gold:#f0c040;--mnrl:#4fffb0;--coin:#f7c948;--dim:rgba(255,255,255,0.45);--energy:#00bfff}
html,body{height:100%;width:100%;overflow:hidden}
#gs{font-family:'Rajdhani',sans-serif;background:var(--bg);color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;max-width:480px;margin:0 auto}
#hud{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:rgba(0,0,0,0.6);border-bottom:1px solid var(--border);flex-shrink:0;gap:4px}
.hud-pill{display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:20px;border:1px solid;font-family:'Orbitron',monospace;font-size:9px;font-weight:700}
#hp-mnrl{border-color:rgba(79,255,176,0.3);color:var(--mnrl)}
#hp-coin{border-color:rgba(247,201,72,0.3);color:var(--coin)}
#hp-nrg{border-color:rgba(0,191,255,0.25);color:var(--energy);flex-direction:column;align-items:flex-start;gap:1px}
#nrg-bar-w{width:64px;height:3px;background:rgba(0,191,255,0.15);border-radius:3px;overflow:hidden}
#nrg-bar{height:100%;background:var(--energy);border-radius:3px;transition:width 0.5s}
#nav{display:flex;background:rgba(0,0,0,0.5);border-bottom:1px solid var(--border);flex-shrink:0}
.nav-btn{flex:1;padding:7px 2px;text-align:center;font-size:8px;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.35);border-top:2px solid transparent;transition:all 0.2s;font-family:'Rajdhani',sans-serif;-webkit-tap-highlight-color:transparent}
.nav-btn .ni{font-size:14px;display:block;margin-bottom:1px}
.nav-btn.active{color:var(--gold);border-top-color:var(--gold)}
#content{flex:1;overflow:hidden;position:relative}
#mine-scene{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:8px 6px 6px;position:relative;gap:8px}
#slot-bar{display:flex;gap:4px;width:100%;justify-content:center;flex-shrink:0}
.slot-pip{width:34px;height:22px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.2s}
.slot-pip.used{border-color:rgba(79,255,176,0.45);background:rgba(79,255,176,0.05)}
.slot-pip.queued-pip{border-color:rgba(247,201,72,0.45);background:rgba(247,201,72,0.05)}
.slot-pip.empty{color:rgba(255,255,255,0.15)}
.slot-pip.locked{opacity:0.2}
.side-col{position:absolute;top:38px;bottom:56px;display:flex;flex-direction:column;justify-content:flex-start;gap:6px;z-index:5;padding-top:4px;overflow:hidden}
#left-col{left:4px}
#right-col{right:4px}
.bubble{width:54px;border-radius:12px;background:rgba(17,29,53,0.95);border:1px solid var(--border);padding:5px 4px;text-align:center;transition:all 0.2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.bubble.rdy{border-color:rgba(79,255,176,0.7);box-shadow:0 0 8px rgba(79,255,176,0.25);animation:bpulse 1.8s ease-in-out infinite}
@keyframes bpulse{0%,100%{box-shadow:0 0 4px rgba(79,255,176,0.2)}50%{box-shadow:0 0 12px rgba(79,255,176,0.4)}}
.bi{font-size:15px;display:block;pointer-events:none}
.bn{font-size:7px;color:rgba(255,255,255,0.6);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.bv{font-family:'Orbitron',monospace;font-size:7px;font-weight:700;color:var(--mnrl);margin-top:1px;pointer-events:none}
.bt{font-family:'Orbitron',monospace;font-size:7px;font-weight:700;margin-top:1px;pointer-events:none}
#mine-center{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;justify-content:center;width:170px}
#stone-wrap{position:relative;width:138px;height:138px;display:flex;align-items:center;justify-content:center}
#stone-svg{position:absolute;top:0;left:0;width:138px;height:138px;transform:rotate(-90deg);pointer-events:none}
#s-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:4}
#s-ring{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 0.5s linear}
#stone-btn{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;cursor:pointer;border:2px solid;transition:transform 0.08s,box-shadow 0.3s;background:rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent}
#stone-btn:active{transform:scale(0.91)}
#min-info{text-align:center}
#min-name-txt{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:1px}
#min-timer-txt{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;margin-top:2px}
#min-sub-txt{font-size:9px;color:var(--dim);margin-top:2px}
#min-slot-txt{font-size:9px;margin-top:2px;font-weight:700}
#arrow-row{display:flex;align-items:center;gap:14px}
.arrow-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#fff;user-select:none;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.arrow-btn:active{transform:scale(0.9)}
#min-dots{display:flex;gap:3px;align-items:center}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.2s}
.dot.cur{width:7px;border-radius:3px}
#mine-btn{width:148px;padding:12px;border:none;border-radius:11px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:1px;color:#fff;transition:all 0.2s;margin-top:2px;-webkit-tap-highlight-color:transparent}
#mine-btn.idle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
#mine-btn.go{background:linear-gradient(135deg,#1d9e75,#0a5c3e);border:none}
#mine-btn.queue{background:linear-gradient(135deg,#7c6a00,#b89600);border:none}
#mine-btn.full{background:rgba(233,69,96,0.12);border:1px solid rgba(233,69,96,0.3);color:#e94560;cursor:not-allowed}
#mine-btn.nrg{background:rgba(0,191,255,0.1);border:1px solid rgba(0,191,255,0.3);color:var(--energy)}
#mine-btn.lim{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);cursor:not-allowed}
#dirt-info{font-size:8px;color:var(--dim);text-align:center}
#scroll-content{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:11px}
.sec-lbl{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
.card{background:var(--card);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid var(--border)}
.shop-item{background:var(--card);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}
.si-btn{padding:8px 12px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;margin-top:4px;-webkit-tap-highlight-color:transparent}
.si-btn.buy{background:linear-gradient(135deg,var(--coin),#e09000);color:#1a0a00}
.si-btn.sell{background:linear-gradient(135deg,#4fffb0,#00c97a);color:#03281a}
.si-btn.dis{opacity:0.3;cursor:not-allowed;background:rgba(255,255,255,0.08);color:#fff}
.mkt-item{background:var(--card);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:8px}
.buy-btn{padding:8px 12px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;background:linear-gradient(135deg,var(--gold),#e09000);color:#1a0a00;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.qpb{background:rgba(255,255,255,0.07);border-radius:10px;height:4px;overflow:hidden;margin:5px 0 3px}
.qpbf{height:100%;border-radius:10px;background:linear-gradient(90deg,#4fffb0,#00c97a);transition:width 0.4s}
.claim-btn{width:100%;padding:10px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;margin-top:5px;-webkit-tap-highlight-color:transparent}
.claim-btn.rdy{background:linear-gradient(135deg,var(--gold),#e09000);color:#1a0a00}
.claim-btn.not{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.25);cursor:not-allowed;border:1px solid rgba(255,255,255,0.07)}
.era-card{background:var(--card);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid var(--border)}
.prestige-btn{width:100%;padding:12px;border:none;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Orbitron',monospace;color:#fff;margin-top:6px;-webkit-tap-highlight-color:transparent}
.prestige-btn.can{background:linear-gradient(135deg,#a855f7,#7c3aed)}
.prestige-btn.cant{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);cursor:not-allowed;border:1px solid rgba(255,255,255,0.07)}
.float-pop{position:fixed;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;pointer-events:none;animation:fpop 1s ease-out forwards;z-index:999;white-space:nowrap}
@keyframes fpop{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(8,13,26,0.97);border:1px solid rgba(79,255,176,0.3);border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700;color:var(--mnrl);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:1000;white-space:nowrap;max-width:92%}
#toast.show{opacity:1}
#inv-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:15;display:none}
#inv-overlay.show{display:block}
#inv-panel{position:absolute;top:0;right:0;bottom:0;width:78%;background:rgba(8,13,26,0.98);border-left:1px solid var(--border);z-index:20;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
#inv-panel.open{transform:translateX(0)}
#inv-close{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.inv-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;margin-bottom:10px;padding-right:30px;color:#fff}
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.inv-item{background:rgba(255,255,255,0.04);border-radius:8px;padding:6px;border:1px solid var(--border);display:flex;align-items:center;gap:5px}
.inv-item-name{font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-item-val{font-family:'Orbitron',monospace;font-size:8px;color:var(--mnrl);margin-top:1px}
/* Loading Screen */
#loading-screen{position:fixed;inset:0;background:#080d1a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity 0.6s ease}
#loading-screen.fade-out{opacity:0;pointer-events:none}
.ls-gem{font-size:60px;animation:ls-pulse 1.3s ease-in-out infinite}
@keyframes ls-pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 10px #4fffb0)}50%{transform:scale(1.15);filter:drop-shadow(0 0 28px #4fffb0)}}
.ls-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#4fffb0;letter-spacing:3px}
.ls-sub{font-size:12px;color:rgba(255,255,255,0.35);font-family:'Rajdhani',sans-serif;letter-spacing:1px}
.ls-bar-w{width:190px;height:4px;background:rgba(79,255,176,0.12);border-radius:4px;overflow:hidden;margin-top:6px}
.ls-bar{height:100%;background:linear-gradient(90deg,#4fffb0,#00c97a);border-radius:4px;width:0%;transition:width 0.12s linear}
/* Tutorial */
#tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:8000;display:flex;align-items:flex-end;justify-content:center;padding-bottom:24px;transition:opacity 0.3s}
#tutorial-overlay.hidden{display:none}
#tutorial-card{background:#111d35;border:1px solid rgba(79,255,176,0.3);border-radius:20px;padding:22px 20px 18px;width:calc(100% - 40px);max-width:440px;position:relative;box-shadow:0 0 40px rgba(79,255,176,0.08)}
.tut-dots{display:flex;gap:7px;justify-content:center;margin-bottom:16px}
.tut-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.3s,transform 0.3s}
.tut-dot.active{background:#4fffb0;transform:scale(1.3)}
.tut-icon{font-size:40px;text-align:center;margin-bottom:10px}
.tut-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#4fffb0;text-align:center;margin-bottom:10px;letter-spacing:1px}
.tut-desc{font-size:13px;color:rgba(255,255,255,0.78);text-align:center;line-height:1.65;font-family:'Rajdhani',sans-serif}
.tut-btns{display:flex;gap:10px;margin-top:18px}
.tut-btn{flex:1;padding:11px;border:none;border-radius:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;-webkit-tap-highlight-color:transparent;letter-spacing:0.5px}
.tut-btn.primary{background:linear-gradient(135deg,#4fffb0,#00c97a);color:#080d1a}
.tut-btn.secondary{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.1)}
#tut-skip{position:absolute;top:14px;right:16px;font-size:11px;color:rgba(255,255,255,0.28);cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:0.5px}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="ls-gem">💎</div>
  <div class="ls-title">GEMSTRIKE</div>
  <div class="ls-sub">Loading your mine...</div>
  <div class="ls-bar-w"><div class="ls-bar" id="ls-bar"></div></div>
</div>
<div id="tutorial-overlay" class="hidden">
  <div id="tutorial-card">
    <span id="tut-skip">SKIP</span>
    <div class="tut-dots" id="tut-dots"></div>
    <div class="tut-icon" id="tut-icon"></div>
    <div class="tut-title" id="tut-title"></div>
    <div class="tut-desc" id="tut-desc"></div>
    <div class="tut-btns">
      <button class="tut-btn secondary" id="tut-prev">← BACK</button>
      <button class="tut-btn primary" id="tut-next">NEXT →</button>
    </div>
  </div>
</div>
<div id="gs">
<div id="hud">
  <div class="hud-pill" id="hp-mnrl">⚡<span id="h-mnrl">0.000</span>$MNRL</div>
  <div class="hud-pill" id="hp-coin">🪙<span id="h-coin">100</span></div>
  <div class="hud-pill" id="hp-nrg">
    <span style="font-size:9px">⚡<span id="h-nrg">100</span>/100</span>
    <div id="nrg-bar-w"><div id="nrg-bar" style="width:100%"></div></div>
  </div>
</div>
<div id="nav">
  <div class="nav-btn active" data-tab="mine"><span class="ni">⛏️</span>MINE</div>
  <div class="nav-btn" data-tab="miner"><span class="ni">🧑‍⚒️</span>MINER</div>
  <div class="nav-btn" data-tab="shop"><span class="ni">🏪</span>SHOP</div>
  <div class="nav-btn" data-tab="market"><span class="ni">🛒</span>MARKET</div>
  <div class="nav-btn" data-tab="quests"><span class="ni">📋</span>QUESTS</div>
  <div class="nav-btn" data-tab="pass"><span class="ni">⭐</span>PASS</div>
</div>
<div id="content">
  <div id="mine-scene" style="display:none">
    <div id="slot-bar"></div>
    <div class="side-col" id="left-col"></div>
    <div class="side-col" id="right-col">
      <div class="bubble" id="rb-inv" style="border-color:rgba(240,192,64,0.35);cursor:pointer">
        <span class="bi">🎒</span><div class="bn">Inventory</div><div class="bv">TAP</div>
      </div>
      <div class="bubble" id="rb-prestige" style="border-color:rgba(168,85,247,0.35);cursor:pointer">
        <span class="bi">✨</span><div class="bn">Prestige</div><div id="rb-era" class="bv" style="color:#a855f7">ERA 0</div>
      </div>

    </div>
    <div id="mine-center">
      <div id="stone-wrap">
        <svg id="stone-svg" viewBox="0 0 138 138">
          <circle id="s-bg" cx="69" cy="69" r="62"/>
          <circle id="s-ring" cx="69" cy="69" r="62" stroke-dasharray="390" stroke-dashoffset="390"/>
        </svg>
        <div id="stone-btn">⬛</div>
      </div>
      <div id="min-info">
        <div id="min-name-txt">DIRT</div>
        <div id="min-timer-txt" style="color:rgba(255,255,255,0.25)">──</div>
        <div id="min-sub-txt">Free · 💨 Dust</div>
        <div id="min-slot-txt"></div>
      </div>
      <div id="arrow-row">
        <div class="arrow-btn" id="btn-prev">◀</div>
        <div id="min-dots"></div>
        <div class="arrow-btn" id="btn-next">▶</div>
      </div>
      <button id="mine-btn" class="idle">⛏️ START MINING</button>
      <div id="dirt-info"></div>
    </div>
  </div>
  <div id="scroll-content" style="display:none"></div>
</div>
<div id="inv-overlay"></div>
<div id="inv-panel">
  <button id="inv-close">✕</button>
  <div class="inv-title">🎒 Inventory</div>
  <div id="inv-body"></div>
</div>
<div id="toast"></div>
</div>

<script>
const MAX_NRG=100,NRG_REGEN=1/60,DIRT_DAILY=30,FREE_SLOTS=3,VIP_SLOTS=5;

const MINERALS=[
  {n:'Dirt',      i:'🟫',c:'#8B5E3C',res:'Dust',         resI:'💨',t:5,    era:0,nrg:0,  coinVal:1,  free:true},
  {n:'Gravel',    i:'🪨',c:'#9E9E9E',res:'Stone',         resI:'🪨',t:15,   era:0,nrg:5,  coinVal:3},
  {n:'Sand',      i:'🟡',c:'#C8A84B',res:'Sand',          resI:'🟡',t:30,   era:0,nrg:8,  coinVal:5},
  {n:'Limestone', i:'⬜',c:'#c8c8c8',res:'Limestone',     resI:'⬜',t:60,   era:0,nrg:12, coinVal:8},
  {n:'Coal',      i:'🖤',c:'#aaaaaa',res:'Coal',          resI:'🖤',t:120,  era:0,nrg:15, coinVal:12},
  {n:'Iron',      i:'🔩',c:'#B87333',res:'Iron Ore',      resI:'🔩',t:240,  era:1,nrg:20, coinVal:20},
  {n:'Copper',    i:'🟠',c:'#DA8A67',res:'Copper',        resI:'🟠',t:420,  era:1,nrg:25, coinVal:30},
  {n:'Silver',    i:'⚪',c:'#C0C0C0',res:'Silver',        resI:'⚪',t:720,  era:1,nrg:30, coinVal:50},
  {n:'Gold',      i:'💛',c:'#FFD700',res:'Gold',          resI:'💛',t:1200, era:1,nrg:40, coinVal:80},
  {n:'Quartz',    i:'🔮',c:'#b0d8ff',res:'Quartz',        resI:'🔮',t:2100, era:1,nrg:50, coinVal:120},
  {n:'Amethyst',  i:'💜',c:'#9B59B6',res:'Amethyst',      resI:'💜',t:3600, era:2,nrg:60, coinVal:200},
  {n:'Sapphire',  i:'🔷',c:'#2980B9',res:'Sapphire',      resI:'🔷',t:7200, era:2,nrg:75, coinVal:350},
  {n:'Ruby',      i:'🔴',c:'#E74C3C',res:'Ruby',          resI:'🔴',t:10800,era:2,nrg:90, coinVal:550},
  {n:'Emerald',   i:'💚',c:'#27AE60',res:'Emerald',       resI:'💚',t:18000,era:2,nrg:100,coinVal:800},
  {n:'Diamond',   i:'💎',c:'#76D7EA',res:'Diamond',       resI:'💎',t:28800,era:2,nrg:120,coinVal:1200},
  {n:'Black Opal',i:'🌑',c:'#7700cc',res:'Black Opal',    resI:'🌑',t:43200,era:3,nrg:150,coinVal:2000},

let G={
  mnrl:0,coins:100,nrg:100,era:0,selIdx:0,
  res:{},slots:[],queue:[],ready:[],
  gear:{pickaxe:null,shirt:null,helmet:null,gloves:null,boots:null,accessory:null},
  quests:{},questClaimed:[],
  starts:0,forges:0,dirtMines:0,dirtReset:0,
  passPremium:false,lastNrg:Date.now(),_id:0,
};

function loadGame(){
  try{
    const d=JSON.parse(localStorage.getItem('gs_v10')||'{}');
    if(d.mnrl!==undefined){
      Object.assign(G,d);
      if(!Array.isArray(G.questClaimed))G.questClaimed=[];
      if(!G.res)G.res={};
      if(!G.slots)G.slots=[];
      if(!G.queue)G.queue=[];
      if(!G.ready)G.ready=[];
      if(!G.gear)G.gear={pickaxe:null,shirt:null,helmet:null,gloves:null,boots:null,accessory:null};
      const now=Date.now();
      const still=[];
      (G.slots||[]).forEach(function(s){
        const m=MINERALS[s.mIdx];
        if(s.endTime<=now&&m){G.ready.push({mIdx:s.mIdx,id:s.id,res:m.res,resI:m.resI,color:m.c,n:m.n});}
        else still.push(s);
      });
      G.slots=still;
      const rt=getNextReset();
      if((G.dirtReset||0)<rt-86400000){G.dirtMines=0;G.dirtReset=rt;}
    }
  }catch(e){console.log('Load error',e);}
}

function saveGame(){
  try{localStorage.setItem('gs_v10',JSON.stringify(G));}catch(e){}
}

function getNextReset(){
  const now=new Date();
  const r=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),8,0,0,0));
  if(now>=r)r.setUTCDate(r.getUTCDate()+1);
  return r.getTime();
}
function dirtResetsIn(){
  const ms=getNextReset()-Date.now();
  return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m';
}
function nid(){return ++G._id;}
function fmtT(ms){
  if(ms<=0)return'READY';const s=Math.ceil(ms/1000);
  if(s<60)return s+'s';
  if(s<3600)return Math.floor(s/60)+'m'+(s%60?' '+(s%60)+'s':'');
  if(s<86400)return Math.floor(s/3600)+'h'+(Math.floor((s%3600)/60)?' '+Math.floor((s%3600)/60)+'m':'');
  return Math.floor(s/86400)+'d '+Math.floor((s%86400)/3600)+'h';
}
function fmtN(n){n=Number(n)||0;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n)+'';}
function getRes(k){return G.res[k]||0;}
function addRes(k,v){G.res[k]=(G.res[k]||0)+v;}
function availMins(){return MINERALS.filter(function(m){return m.era<=G.era;});}
function curMin(){var av=availMins();return av[Math.min(G.selIdx,av.length-1)];}
function maxSlots(){return G.passPremium?VIP_SLOTS:FREE_SLOTS;}
function totalUsed(){return G.slots.length+G.queue.length;}
function slotsAvail(){return G.slots.length<maxSlots();}
function canQueue(){return totalUsed()<maxSlots();}
function isQuestClaimed(i){return G.questClaimed.indexOf(i)!==-1;}

function showToast(msg,color){
  var t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.style.color=color||'var(--mnrl)';
  t.classList.add('show');clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('show');},2500);
}

function spawnFloat(txt,color,x,y){
  var d=document.createElement('div');
  d.className='float-pop';d.textContent=txt;
  d.style.cssText='left:'+x+'px;top:'+y+'px;color:'+(color||'#4fffb0');
  document.body.appendChild(d);
  setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},1000);
}

function updateQP(key,val){
  QUESTS.forEach(function(q,i){
    if(isQuestClaimed(i))return;
    if(q.key===key)G.quests[i]=Math.min(q.goal,val);
  });
}

function claimableCount(){
  return QUESTS.filter(function(q,i){
    return !isQuestClaimed(i)&&(G.quests[i]||0)>=q.goal;
  }).length;
}

function regenNrg(){
  var now=Date.now();
  var dt=(now-(G.lastNrg||now))/1000;
  G.lastNrg=now;
  G.nrg=Math.min(MAX_NRG,G.nrg+NRG_REGEN*dt);
}

function tickSlots(){
  var now=Date.now();var changed=false;var still=[];
  G.slots.forEach(function(s){
    var m=MINERALS[s.mIdx];
    if(s.endTime<=now&&m){
      G.ready.push({mIdx:s.mIdx,id:s.id,res:m.res,resI:m.resI,color:m.c,n:m.n});
      changed=true;
    } else still.push(s);
  });
  G.slots=still;
  while(G.queue.length>0&&G.slots.length<maxSlots()){
    var next=G.queue.shift();var m=MINERALS[next.mIdx];
    if(m){G.slots.push({mIdx:next.mIdx,endTime:now+m.t*1000,id:next.id});changed=true;}
  }
  return changed;
}

// ✅ THE FIX: collect using direct DOM touchstart/click on each bubble
function collectItem(id){
  var idx=-1;
  for(var i=0;i<G.ready.length;i++){if(G.ready[i].id===id){idx=i;break;}}
  if(idx===-1)return;
  var r=G.ready[idx];
  addRes(r.res,1);
  updateQP('r_'+r.res,getRes(r.res));
  G.ready.splice(idx,1);
  spawnFloat('+1 '+r.res,r.color,80,200);
  showToast(r.resI+' +1 '+r.res+' collected!');
  saveGame();
  updateMineView();
}

var currentTab='mine';

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  var ms=document.getElementById('mine-scene');
  var sc=document.getElementById('scroll-content');
  if(tab==='mine'){ms.style.display='flex';sc.style.display='none';}
  else{ms.style.display='none';sc.style.display='block';renderScroll();}
  updateHUD();
}

function updateHUD(){
  regenNrg();
  var me=document.getElementById('h-mnrl');if(me)me.textContent=G.mnrl.toFixed(3);
  var ce=document.getElementById('h-coin');if(ce)ce.textContent=fmtN(G.coins);
  var ne=document.getElementById('h-nrg');if(ne)ne.textContent=Math.floor(G.nrg);
  var nb=document.getElementById('nrg-bar');if(nb)nb.style.width=(G.nrg/MAX_NRG*100)+'%';
  var re=document.getElementById('rb-era');if(re)re.textContent='ERA '+G.era;
  var rq=document.getElementById('rb-q');if(rq)rq.textContent=claimableCount();
}

function updateMineView(){
  tickSlots();
  var av=availMins();if(!av.length)return;
  G.selIdx=Math.min(G.selIdx,av.length-1);
  var m=curMin();var mIdx=MINERALS.indexOf(m);
  var now=Date.now();
  var isDirt=!!m.free;var dirtLeft=DIRT_DAILY-G.dirtMines;
  var hasNrg=isDirt||(G.nrg>=m.nrg);
  var CIRC=2*Math.PI*62;
  var myActive=G.slots.filter(function(s){return s.mIdx===mIdx;}).sort(function(a,b){return a.endTime-b.endTime;});
  var earliest=myActive[0];
  var rem=earliest?Math.max(0,earliest.endTime-now):0;
  var frac=earliest?Math.max(0,1-rem/(m.t*1000)):0;
  var myQueued=G.queue.filter(function(q){return q.mIdx===mIdx;}).length;

  var sb=document.getElementById('stone-btn');
  if(sb){sb.textContent=m.i;sb.style.borderColor=m.c;sb.style.background='radial-gradient(circle at 38% 38%, '+m.c+'44, '+m.c+'11)';sb.style.boxShadow=canQueue()&&hasNrg&&(!isDirt||dirtLeft>0)?'0 0 16px '+m.c+'44':'none';sb.style.opacity=!canQueue()||(!hasNrg&&!isDirt)||(isDirt&&dirtLeft<=0)?'0.6':'1';}
  var ring=document.getElementById('s-ring');
  if(ring){ring.style.stroke=m.c;ring.style.strokeDashoffset=CIRC*(1-frac);}
  var nmTxt=document.getElementById('min-name-txt');
  if(nmTxt){nmTxt.textContent=m.n.toUpperCase();nmTxt.style.color=m.c;}
  var tmrTxt=document.getElementById('min-timer-txt');
  if(tmrTxt){tmrTxt.textContent=myActive.length?fmtT(rem):'──';tmrTxt.style.color=myActive.length?m.c:'rgba(255,255,255,0.25)';}
  var subTxt=document.getElementById('min-sub-txt');
  if(subTxt)subTxt.textContent=(isDirt?'Free mine':'⚡'+m.nrg+' energy')+' · '+m.resI+' '+m.res;
  var slotTxt=document.getElementById('min-slot-txt');
  if(slotTxt){var parts=[];if(myActive.length)parts.push(myActive.length+' running');if(myQueued)parts.push(myQueued+' queued');slotTxt.textContent=parts.join(' · ');slotTxt.style.color=myQueued?'var(--coin)':'var(--mnrl)';}
  var df=document.getElementById('dirt-info');
  if(df)df.textContent=isDirt?(dirtLeft+'/'+DIRT_DAILY+' free · resets '+dirtResetsIn()):'';
  var btn=document.getElementById('mine-btn');
  if(btn){
    if(isDirt&&dirtLeft<=0){btn.className='lim';btn.textContent='🔒 DAILY LIMIT';}
    else if(!hasNrg&&!isDirt){btn.className='nrg';btn.textContent='⚡ NEED ENERGY';}
    else if(!canQueue()){btn.className='full';btn.textContent='⛔ ALL SLOTS FULL';}
    else if(!slotsAvail()){btn.className='queue';btn.textContent='📋 ADD TO QUEUE';}
    else{btn.className='go';btn.textContent='⛏️ START MINING';}
  }

  var sb2=document.getElementById('slot-bar');
  if(sb2){
    var max=maxSlots();var html='';
    for(var i=0;i<max;i++){
      var s=G.slots[i];var q=!s?G.queue[i-G.slots.length]:null;
      if(s){var sm=MINERALS[s.mIdx];html+='<div class="slot-pip used" title="'+(sm?sm.n:'?')+'">'+(sm?sm.i:'?')+'</div>';}
      else if(q){var qm=MINERALS[q.mIdx];html+='<div class="slot-pip queued-pip" title="Queued: '+(qm?qm.n:'?')+'">'+(qm?qm.i:'?')+'</div>';}
      else html+='<div class="slot-pip empty">○</div>';
    }
    if(!G.passPremium)for(var j=0;j<VIP_SLOTS-FREE_SLOTS;j++)html+='<div class="slot-pip locked" title="VIP only">🔒</div>';
    sb2.innerHTML=html;
  }

  // ✅ BUILD LEFT COL — attach real event listeners to each bubble
  var lc=document.getElementById('left-col');
  if(lc){
    lc.innerHTML='';

    // Ready bubbles — create DOM elements and attach listeners directly
    G.ready.forEach(function(r){
      var bub=document.createElement('div');
      bub.className='bubble rdy';
      bub.style.cursor='pointer';
      bub.innerHTML='<span class="bi">'+r.resI+'</span><div class="bn" style="color:#4fffb0">'+r.n+'</div><div class="bt" style="color:#4fffb0">COLLECT</div>';
      var capturedId=r.id;
      // Attach both click and touchend for mobile
      bub.addEventListener('pointerdown',function(e){e.stopPropagation();collectItem(capturedId);});
      lc.appendChild(bub);
    });

    // Active mining bubbles
    G.slots.forEach(function(s){
      var sm=MINERALS[s.mIdx];if(!sm)return;
      var sr=Math.max(0,s.endTime-now);
      var bub=document.createElement('div');
      bub.className='bubble';
      bub.style.borderColor=sm.c+'44';
      bub.innerHTML='<span class="bi">'+sm.i+'</span><div class="bn">'+sm.n+'</div><div class="bt" style="color:'+sm.c+'">'+fmtT(sr)+'</div>';
      lc.appendChild(bub);
    });

    // Queued bubbles
    G.queue.forEach(function(q){
      var qm=MINERALS[q.mIdx];if(!qm)return;
      var bub=document.createElement('div');
      bub.className='bubble';
      bub.style.borderColor='rgba(247,201,72,0.35)';
      bub.innerHTML='<span class="bi">'+qm.i+'</span><div class="bn">'+qm.n+'</div><div class="bt" style="color:var(--coin)">NEXT</div>';
      lc.appendChild(bub);
    });

    if(lc.children.length===0){
      lc.innerHTML='<div style="font-size:8px;color:var(--dim);padding:4px;text-align:center">No active<br>mining</div>';
    }
  }

  // Dots
  var dots=document.getElementById('min-dots');
  if(dots){
    var show=Math.min(av.length,7);var start=Math.max(0,Math.min(G.selIdx-3,av.length-show));
    var dhtml='';
    for(var di=0;di<show;di++){var ai=start+di;var ac=ai===G.selIdx;dhtml+='<div class="dot'+(ac?' cur':'')+'" style="'+(ac?'background:'+m.c:'')+'" ></div>';}
    dots.innerHTML=dhtml;
  }
}

function handleMine(){
  regenNrg();
  var m=curMin();var mIdx=MINERALS.indexOf(m);
  var isDirt=!!m.free;var dirtLeft=DIRT_DAILY-G.dirtMines;
  var hasNrg=isDirt||(G.nrg>=m.nrg);
  if(isDirt&&dirtLeft<=0){showToast('🔒 Daily Dirt limit. Resets at 8am UTC','#e94560');return;}
  if(!hasNrg){switchTab('shop');showToast('⚡ Not enough energy!','#e94560');return;}
  if(!canQueue()){showToast('⛔ All '+maxSlots()+' slots full. Collect first!','#e94560');return;}
  if(isDirt)G.dirtMines++;else G.nrg-=m.nrg;
  var id=nid();
  if(slotsAvail()){
    G.slots.push({mIdx:mIdx,endTime:Date.now()+m.t*1000,id:id});G.starts++;
    updateQP('starts',G.starts);
    showToast('⛏️ Mining '+m.n+'… ('+G.slots.length+'/'+maxSlots()+' slots used)');
  } else {
    G.queue.push({mIdx:mIdx,id:id});
    showToast('📋 '+m.n+' queued ('+(G.slots.length+G.queue.length)+'/'+maxSlots()+' total)','var(--coin)');
  }
  saveGame();updateMineView();
}

function closeInv(){document.getElementById('inv-panel').classList.remove('open');document.getElementById('inv-overlay').classList.remove('show');}

  document.getElementById('inv-body').innerHTML=resHtml+gearHtml+statsHtml;
}

function renderScroll(){
  var html='';
  if(currentTab==='miner'){
    html='<div class="sec-lbl">YOUR MINER</div><div style="text-align:center;margin-bottom:12px"><span style="font-size:58px;display:block;line-height:1">🧑‍⚒️</span><div style="font-family:Orbitron,monospace;font-size:11px;font-weight:700;margin-top:5px;color:#fff">Rookie Miner</div><div style="font-size:9px;color:var(--dim);margin-top:2px">'+ERAS[G.era].n+' · '+maxSlots()+' shared slots</div></div><div class="sec-lbl">GEAR SLOTS</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+GEAR_SLOTS.map(function(gs){var eq=G.gear[gs.slot];return'<div style="background:var(--card);border-radius:10px;padding:9px;border:1px solid '+(eq?'rgba(79,255,176,0.35)':'var(--border)')+'"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:18px">'+gs.icon+'</span><div><div style="font-size:11px;font-weight:700;color:#fff">'+gs.name+'</div><div style="font-size:9px;color:var(--dim)">'+gs.effect+'</div></div></div>'+(eq?'<div style="font-size:9px;color:var(--mnrl);font-weight:700">✓ '+eq+'</div>':'<div style="font-size:9px;color:rgba(255,255,255,0.2);font-style:italic">Empty</div>')+'</div>';}).join('')+'</div>';
  } else if(currentTab==='shop'){
    var avRes=Object.entries(G.res).filter(function(e){return e[1]>0;});
    html='<div class="sec-lbl">🏪 DEVELOPER SHOP</div><div style="padding:7px 10px;background:var(--card);border-radius:8px;border-left:2px solid rgba(247,201,72,0.4);font-size:10px;color:var(--dim);margin-bottom:10px;line-height:1.6">Buy energy · Sell resources · Convert $MNRL → Coins</div><div class="sec-lbl">BUY ENERGY</div>'+SHOP_NRG.map(function(e,i){return'<div class="shop-item"><div style="font-size:20px;flex-shrink:0">'+e.icon+'</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#fff">'+e.label+'</div><div style="font-size:10px;color:var(--dim)">Restores '+e.nrg+' energy</div></div><div style="text-align:right"><div style="font-family:Orbitron,monospace;font-size:10px;color:var(--coin);font-weight:700">🪙'+e.coins+'</div><button class="si-btn '+(G.coins>=e.coins?'buy':'dis')+'" data-action="buy-nrg" data-idx="'+i+'" style="margin-top:3px">'+(G.coins>=e.coins?'BUY':'No Coins')+'</button></div></div>';}).join('')+'<div class="sec-lbl" style="margin-top:4px">SELL RESOURCES</div>'+(avRes.length?avRes.map(function(e){var k=e[0],v=e[1];var m=MINERALS.find(function(x){return x.res===k;});var val=m?m.coinVal:1;return'<div class="shop-item"><div style="font-size:20px">'+(m?m.resI:'📦')+'</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#fff">'+k+'</div><div style="font-size:10px;color:var(--dim)">Have: '+fmtN(v)+' · 🪙'+val+'/ea</div></div><div style="display:flex;gap:4px;flex-shrink:0"><button class="si-btn sell" data-action="sell-res" data-key="'+k+'" data-qty="1" data-val="'+val+'">×1</button><button class="si-btn sell" data-action="sell-res" data-key="'+k+'" data-qty="'+Math.floor(v)+'" data-val="'+val+'">All</button></div></div>';}).join(''):'<div style="font-size:11px;color:var(--dim);padding:8px">No resources yet.</div>')+'<div class="sec-lbl" style="margin-top:4px">CONVERT</div><div class="shop-item"><div style="font-size:20px">⚡</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#fff">$MNRL → Coins</div><div style="font-size:10px;color:var(--dim)">1 $MNRL = 50 Coins</div></div><button class="si-btn buy" data-action="convert-mnrl" '+(G.mnrl>=1?'':'disabled style="opacity:0.3"')+'>Convert 1</button></div>';
  } else if(currentTab==='market'){
    html='<div class="sec-lbl">🛒 PLAYER MARKETPLACE · 5% TAX</div><div style="padding:7px 10px;background:var(--card);border-radius:8px;border-left:2px solid rgba(233,69,96,0.4);font-size:10px;color:var(--dim);margin-bottom:10px">Player-to-player only. 5% tax → community pool.</div>'+MKT.map(function(item,i){var total=(item.price*1.05).toFixed(1);var can=G.mnrl>=Number(total);return'<div class="mkt-item"><div style="font-size:22px;flex-shrink:0">'+item.i+'</div><div style="flex:1"><div style="font-size:12px;font-weight:700;color:#fff">'+item.n+(item.nft?' <span style="font-size:8px;padding:1px 5px;background:rgba(168,85,247,0.2);color:#a855f7;border:1px solid rgba(168,85,247,0.3);border-radius:6px">NFT</span>':'')+'</div><div style="font-size:9px;color:var(--dim)">by '+item.seller+' · +'+( item.price*0.05).toFixed(1)+' tax</div></div><div style="text-align:right;flex-shrink:0"><div style="font-family:Orbitron,monospace;font-size:10px;font-weight:700;color:var(--gold)">⚡'+item.price+'</div><button class="buy-btn" style="margin-top:3px;'+(can?'':'opacity:0.3;cursor:not-allowed')+'" data-action="buy-mkt" data-idx="'+i+'">'+(can?'BUY':'Low $MNRL')+'</button></div></div>';}).join('');
  } else if(currentTab==='quests'){
    html='<div class="sec-lbl">ACTIVE QUESTS</div>'+QUESTS.map(function(q,i){var prog=G.quests[i]||0;var pct=Math.min(100,prog/q.goal*100);var done=prog>=q.goal;var claimed=isQuestClaimed(i);return'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><div style="font-size:13px;font-weight:700;color:#fff">'+q.n+'</div><div style="font-size:11px;color:var(--mnrl);font-weight:700">+'+q.reward+' $MNRL</div></div><div style="font-size:11px;color:var(--dim);margin-bottom:4px">'+q.desc+'</div><div class="qpb"><div class="qpbf" style="width:'+pct+'%"></div></div><div style="font-size:9px;color:var(--dim);text-align:right;margin-bottom:3px">'+fmtN(prog)+' / '+fmtN(q.goal)+'</div><button class="claim-btn '+(done&&!claimed?'rdy':'not')+'" data-action="claim-q" data-idx="'+i+'">'+(claimed?'✓ Claimed':done?'🎁 Claim Reward':'In progress...')+'</button></div>';}).join('');
  } else if(currentTab==='pass'){
    html='<div style="text-align:center;padding:6px 0 10px;border-bottom:1px solid var(--border);margin-bottom:10px"><div style="font-family:Orbitron,monospace;font-size:15px;font-weight:900;color:var(--gold)">⭐ MINER\'S PASS</div><div style="font-size:10px;color:var(--dim);margin-top:2px">Season 1 · Chapter 1 · 60 days</div></div><div style="background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px"><div style="padding:7px 10px;background:rgba(255,255,255,0.04);font-size:10px;font-weight:700;color:#fff">FREE TRACK</div><div style="padding:5px 10px;border-bottom:1px solid var(--border);font-size:10px;color:rgba(255,255,255,0.75)">✓ 3 shared mining slots</div><div style="padding:5px 10px;border-bottom:1px solid var(--border);font-size:10px;color:rgba(255,255,255,0.75)">✓ 30 free Dirt mines/day</div><div style="padding:5px 10px;font-size:10px;color:rgba(255,255,255,0.75)">✓ Basic quests & rewards</div></div><div style="background:var(--card);border-radius:10px;border:1px solid rgba(240,192,64,0.4);overflow:hidden;margin-bottom:10px"><div style="padding:7px 10px;background:rgba(240,192,64,0.1);font-size:10px;font-weight:700;color:var(--gold)">⭐ PREMIUM — VIP</div><div style="padding:5px 10px;border-bottom:1px solid var(--border);font-size:10px;color:rgba(255,255,255,0.75)">⭐ 5 shared mining slots</div><div style="padding:5px 10px;border-bottom:1px solid var(--border);font-size:10px;color:rgba(255,255,255,0.75)">⭐ Market tax: 1.5%</div><div style="padding:5px 10px;border-bottom:1px solid var(--border);font-size:10px;color:rgba(255,255,255,0.75)">⭐ 3 exclusive quests/season</div><div style="padding:5px 10px;font-size:10px;color:rgba(255,255,255,0.75)">⭐ Exclusive NFT cosmetic</div></div>'+(G.passPremium?'<div style="text-align:center;color:var(--gold);font-weight:700;padding:10px;background:rgba(240,192,64,0.08);border-radius:10px;border:1px solid rgba(240,192,64,0.3)">✓ VIP ACTIVE</div>':'<button data-action="upg-pass" style="width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold),#e09000);color:#1a0a00;font-size:13px;font-weight:700;cursor:pointer;font-family:Orbitron,monospace">UPGRADE TO VIP · $4.99</button>');
  } else if(currentTab==='prestige'){
    html='<div class="sec-lbl">PRESTIGE — UNLOCK NEW MINERALS</div><div style="padding:8px 10px;background:var(--card);border-radius:8px;border-left:2px solid rgba(168,85,247,0.5);font-size:10px;color:var(--dim);margin-bottom:10px;line-height:1.6">Unlock new minerals each era. No yield bonuses. $MNRL, Coins, and NFT gear always kept.</div>'+ERAS.map(function(era,i){var isCurr=G.era===i;var isPast=i<G.era;var req=era.req;var hasC=getRes('Cosmic Essence')>=req.cosmic;var hasM=G.mnrl>=req.mnrl;var canDo=i===G.era+1&&hasC&&hasM;return'<div class="era-card" style="'+(isCurr?'border-color:'+era.c+'44':'')+';'+(isPast?'opacity:0.4':'')+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:'+(i>G.era?'8px':'0')+'"><span style="font-size:22px">'+era.n.split(' ')[0]+'</span><div style="flex:1"><div style="font-size:13px;font-weight:700;color:'+era.c+'">'+era.n+'</div><div style="font-size:10px;color:var(--dim);margin-top:1px">'+(req.cosmic>0?'Needs: '+req.cosmic+' Cosmic Essence · '+req.mnrl+' $MNRL':'Starting era')+'</div><div style="font-size:10px;color:var(--mnrl);margin-top:2px">Unlocks: '+era.desc+'</div></div>'+(isCurr?'<span style="font-size:8px;padding:2px 7px;background:'+era.c+'22;color:'+era.c+';border-radius:10px;border:1px solid '+era.c+'33">CURRENT</span>':'')+(isPast?'<span style="font-size:9px;color:var(--dim)">DONE</span>':'')+'</div>'+(i>G.era?'<button class="prestige-btn '+(canDo?'can':'cant')+'" data-action="prestige" data-idx="'+i+'">'+(canDo?'✨ PRESTIGE NOW':!hasC?'🔒 Need '+req.cosmic+' Cosmic Essence':'🔒 Need '+req.mnrl+' $MNRL')+'</button>':'')+'</div>';}).join('');
  }

  var sc=document.getElementById('scroll-content');
  sc.innerHTML=html;

  // Attach event listeners to all scroll content buttons
  sc.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',handleScrollAction);
    el.addEventListener('touchend',function(e){e.preventDefault();handleScrollAction.call(this,e);});
  });
}

function handleScrollAction(e){
  var action=this.dataset.action;
  if(action==='buy-nrg'){
    var i=parseInt(this.dataset.idx);var en=SHOP_NRG[i];
    if(G.coins<en.coins){showToast('❌ Not enough Coins','#e94560');return;}
    G.coins-=en.coins;G.nrg=Math.min(MAX_NRG,G.nrg+en.nrg);
    showToast('⚡ +'+en.nrg+' energy!');saveGame();renderScroll();updateHUD();
  } else if(action==='sell-res'){
    var k=this.dataset.key;var qty=parseInt(this.dataset.qty);var val=parseInt(this.dataset.val);
    var have=getRes(k);if(have<qty)return;
    G.res[k]=Math.max(0,have-qty);G.coins+=qty*val;
    showToast('🪙 Sold '+qty+'× '+k+' → '+qty*val+' Coins','var(--coin)');
    saveGame();renderScroll();updateHUD();
  } else if(action==='convert-mnrl'){
    if(G.mnrl<1){showToast('❌ Need at least 1 $MNRL','#e94560');return;}
    G.mnrl-=1;G.coins+=50;showToast('🪙 1 $MNRL → 50 Coins','var(--coin)');saveGame();renderScroll();updateHUD();
  } else if(action==='buy-mkt'){
    var i=parseInt(this.dataset.idx);var item=MKT[i];var total=item.price*1.05;
    if(G.mnrl<total){showToast('❌ Not enough $MNRL','#e94560');return;}
    G.mnrl-=total;if(item.res)addRes(item.res,item.qty);
    if(item.nft&&item.gs&&!G.gear[item.gs])G.gear[item.gs]=item.gn;
    showToast('✅ Bought '+item.n+'!');saveGame();renderScroll();updateHUD();
  } else if(action==='claim-q'){
    var i=parseInt(this.dataset.idx);var q=QUESTS[i];
    if((G.quests[i]||0)<q.goal||isQuestClaimed(i))return;
    G.questClaimed.push(i);G.mnrl+=q.reward;
    showToast('🎁 +'+q.reward+' $MNRL!');saveGame();renderScroll();updateHUD();
  } else if(action==='upg-pass'){
    G.passPremium=true;showToast('⭐ VIP! 5 slots unlocked!');saveGame();renderScroll();updateHUD();
  } else if(action==='prestige'){
    var i=parseInt(this.dataset.idx);var era=ERAS[i];
    if(getRes('Cosmic Essence')<era.req.cosmic||G.mnrl<era.req.mnrl)return;
    var cosmicLeft=Math.max(0,(G.res['Cosmic Essence']||0)-era.req.cosmic);
    G.era=i;G.res={};if(cosmicLeft>0)G.res['Cosmic Essence']=cosmicLeft;
    G.slots=[];G.queue=[];G.ready=[];G.selIdx=0;G.starts=0;G.forges=0;
    G.quests={};G.questClaimed=[];
    showToast('✨ Welcome to '+era.n+'!');saveGame();switchTab('mine');
  }
}

function setupListeners(){
  // Nav
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.addEventListener('click',function(){switchTab(b.dataset.tab);});
  });
  // Stone + mine btn
  document.getElementById('stone-btn').addEventListener('click',handleMine);
  document.getElementById('stone-btn').addEventListener('touchend',function(e){e.preventDefault();handleMine();});
  document.getElementById('mine-btn').addEventListener('click',handleMine);
  document.getElementById('mine-btn').addEventListener('touchend',function(e){e.preventDefault();handleMine();});
  // Arrows
  document.getElementById('btn-prev').addEventListener('click',function(){var av=availMins();G.selIdx=(G.selIdx-1+av.length)%av.length;updateMineView();});
  document.getElementById('btn-next').addEventListener('click',function(){var av=availMins();G.selIdx=(G.selIdx+1)%av.length;updateMineView();});
  // Right bubbles
  document.getElementById('rb-inv').addEventListener('click',openInv);
  document.getElementById('rb-prestige').addEventListener('click',function(){switchTab('prestige');});
  // Inventory
  document.getElementById('inv-overlay').addEventListener('click',closeInv);
  document.getElementById('inv-close').addEventListener('click',closeInv);
}

function gameLoop(){
  regenNrg();tickSlots();
  if(currentTab==='mine')updateMineView();
  updateHUD();
  if(Math.random()<0.005)saveGame();
  requestAnimationFrame(gameLoop);
}

// LOADING SCREEN
function startLoadingScreen(onDone){
  var bar=document.getElementById('ls-bar');
  var screen=document.getElementById('loading-screen');
  var progress=0;
  var iv=setInterval(function(){
    progress+=Math.random()*18+6;
    if(progress>=100){
      progress=100;
      clearInterval(iv);
      bar.style.width='100%';
      setTimeout(function(){
        screen.classList.add('fade-out');
        setTimeout(function(){screen.style.display='none';if(onDone)onDone();},600);
      },350);
    }
    bar.style.width=progress+'%';
  },80);
}

// TUTORIAL
var TUT_STEPS=[
  {icon:'💎',title:'WELCOME TO GEMSTRIKE',desc:'Mine rare gems, forge powerful gear, and build your mining empire! This quick guide will get you started.'},
  {icon:'⛏️',title:'START MINING',desc:'Tap the big stone in the center to begin mining! Use the ◀ ▶ arrows to switch between different minerals.'},
  {icon:'✅',title:'COLLECT RESOURCES',desc:'When a mine finishes, a glowing green bubble appears on the left side. Tap it to collect your resources!'},
  {icon:'⚡',title:'ENERGY SYSTEM',desc:'Mining costs Energy shown in the top bar. It regenerates over time. Dirt is always free — great for new miners!'},
  {icon:'🧭',title:'NAVIGATE THE GAME',desc:'Use the tabs at the bottom to visit the Shop, Market, Quests, and your Battle Pass for rewards and upgrades.'},
  {icon:'🚀',title:'YOU\'RE READY!',desc:'Start with Dirt to earn your first resources, then unlock better minerals as you grow. Good luck out there, miner!'},
];
var tutStep=0;
function renderTutStep(){
  var s=TUT_STEPS[tutStep];
  document.getElementById('tut-icon').textContent=s.icon;
  document.getElementById('tut-title').textContent=s.title;
  document.getElementById('tut-desc').textContent=s.desc;
  var dotsEl=document.getElementById('tut-dots');
  dotsEl.innerHTML='';
  TUT_STEPS.forEach(function(_,i){var d=document.createElement('div');d.className='tut-dot'+(i===tutStep?' active':'');dotsEl.appendChild(d);});
  var prev=document.getElementById('tut-prev');
  prev.style.visibility=tutStep===0?'hidden':'visible';
  document.getElementById('tut-next').textContent=tutStep===TUT_STEPS.length-1?'START MINING ⛏️':'NEXT →';
}
function closeTutorial(){
  document.getElementById('tutorial-overlay').classList.add('hidden');
  localStorage.setItem('gs_tut_done','1');
}
function setupTutorial(){
  document.getElementById('tut-prev').addEventListener('click',function(){if(tutStep>0){tutStep--;renderTutStep();}});
  document.getElementById('tut-next').addEventListener('click',function(){if(tutStep<TUT_STEPS.length-1){tutStep++;renderTutStep();}else closeTutorial();});
  document.getElementById('tut-skip').addEventListener('click',closeTutorial);
  if(!localStorage.getItem('gs_tut_done')){
    setTimeout(function(){document.getElementById('tutorial-overlay').classList.remove('hidden');renderTutStep();},200);
  }
}

// START
loadGame();
setupListeners();
switchTab('mine');
gameLoop();
startLoadingScreen(setupTutorial);
</script>
