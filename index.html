<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GemStrike — Mine · Forge · Empire</title>
  <meta name="description" content="GemStrike — an idle mining game on the Ronin Network. Mine gems, forge items, and build your empire.">
  <meta name="theme-color" content="#080d1a">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="loading-screen">
  <div class="ls-gem">💎</div>
  <div class="ls-title">GEMSTRIKE</div>
  <div class="ls-sub">Loading your mine...</div>
  <div class="ls-bar-w"><div class="ls-bar" id="ls-bar"></div></div>
</div>
<div id="tutorial-overlay" class="hidden">
  <div id="tutorial-card">
    <span id="tut-skip">SKIP</span>
    <div class="tut-dots" id="tut-dots"></div>
    <div class="tut-icon" id="tut-icon"></div>
    <div class="tut-title" id="tut-title"></div>
    <div class="tut-desc" id="tut-desc"></div>
    <div class="tut-btns">
      <button class="tut-btn secondary" id="tut-prev">← BACK</button>
      <button class="tut-btn primary" id="tut-next">NEXT →</button>
    </div>
  </div>
</div>
<div id="gs">
<div id="hud">
  <div class="hud-pill" id="hp-mnrl">⚡<span id="h-mnrl">0.000</span>$MNRL</div>
  <div class="hud-pill" id="hp-coin">🪙<span id="h-coin">100</span></div>
  <div class="hud-pill" id="hp-nrg">
    <span style="font-size:9px">⚡<span id="h-nrg">100</span></span>
  </div>
</div>
<div id="nav">
  <div class="nav-btn active" data-tab="mine"><span class="ni">⛏️</span>MINE</div>
  <div class="nav-btn" data-tab="forge"><span class="ni">🔥</span>FORGE</div>
  <div class="nav-btn" data-tab="miner"><span class="ni">🧑‍⚒️</span>MINER</div>
  <div class="nav-btn" data-tab="shop"><span class="ni">🏪</span>SHOP</div>
  <div class="nav-btn" data-tab="market"><span class="ni">🛒</span>MARKET</div>
  <div class="nav-btn" data-tab="quests"><span class="ni">📋</span>QUESTS</div>
  <div class="nav-btn" data-tab="pass"><span class="ni">⭐</span>PASS</div>
</div>
<div id="content">
  <div id="mine-scene" style="display:none">
    <div id="slot-bar"></div>
    <div class="side-col" id="left-col"></div>
    <div class="side-col" id="right-col">
      <div class="bubble" id="rb-inv" style="border-color:rgba(240,192,64,0.35);cursor:pointer">
        <span class="bi">🎒</span><div class="bn">Inventory</div><div class="bv">TAP</div>
      </div>
      <div class="bubble" id="rb-prestige" style="border-color:rgba(168,85,247,0.35);cursor:pointer">
        <span class="bi">✨</span><div class="bn">Prestige</div><div id="rb-era" class="bv" style="color:#a855f7">ERA 0</div>
      </div>
    </div>
    <div id="mine-center">
      <div id="stone-wrap">
        <svg id="stone-svg" viewBox="0 0 138 138">
          <circle id="s-bg" cx="69" cy="69" r="62"/>
          <circle id="s-ring" cx="69" cy="69" r="62" stroke-dasharray="390" stroke-dashoffset="390"/>
        </svg>
        <div id="stone-btn">⬛</div>
      </div>
      <div id="min-info">
        <div id="min-name-txt">DIRT</div>
        <div id="min-timer-txt" style="color:rgba(255,255,255,0.25)">──</div>
        <div id="min-sub-txt">Free · 💨 Dust</div>
        <div id="min-slot-txt"></div>
      </div>
      <div id="arrow-row">
        <div class="arrow-btn" id="btn-prev">◀</div>
        <div id="min-dots"></div>
        <div class="arrow-btn" id="btn-next">▶</div>
      </div>
      <button id="mine-btn" class="idle">⛏️ START MINING</button>
      <div id="dirt-info"></div>
    </div>
  </div>
  <div id="scroll-content" style="display:none"></div>
</div>
<div id="empire-overlay"></div>
<div id="empire-panel">
  <button id="empire-close">✕</button>
  <div id="empire-body"></div>
</div>
<div id="inv-overlay"></div>
<div id="inv-panel">
  <button id="inv-close">✕</button>
  <div class="inv-title">🎒 Inventory</div>
  <div id="inv-body"></div>
</div>
<div id="toast"></div>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
